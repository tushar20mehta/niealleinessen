<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeverEatAlone</title>
    <style>
        /* CSS: Das Design der App */
        :root {
            --primary-color: #ff6b6b;
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; }
        h1 { text-align: center; color: var(--primary-color); font-size: 2.5rem; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        
        .host-form { background-color: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .host-form h2 { margin-top: 0; font-size: 1.2rem; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #fa5252; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .meals-list h2 { font-size: 1.2rem; }
        .meal-card { background-color: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid var(--primary-color); }
        .meal-card h3 { margin: 0 0 10px 0; color: var(--primary-color); }
        .meal-details { margin-bottom: 15px; font-size: 0.95rem; }
        .meal-details span { display: block; margin-bottom: 5px; }
        
        details { margin-top: 15px; background-color: #f1f3f5; padding: 10px; border-radius: 8px; font-size: 0.9rem; }
        summary { font-weight: bold; cursor: pointer; outline: none; color: #495057; }
        ul.guest-list { list-style-type: none; padding: 0; margin: 10px 0 0 0; }
        ul.guest-list li { display: flex; justify-content: space-between; align-items: center; background-color: white; padding: 8px 10px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #e9ecef; }
        .remove-btn { background-color: transparent; color: #ff6b6b; border: none; padding: 0; width: auto; font-size: 1rem; cursor: pointer; }
        .remove-btn:hover { background-color: transparent; transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>NeverEatAlone 🍽️</h1>
        <p class="subtitle">Gemeinsam essen, statt alleine bleiben.</p>

        <div class="host-form">
            <h2>Essen anbieten (Host werden)</h2>
            <form id="addMealForm">
                <input type="text" id="hostName" placeholder="Dein Name" required>
                <input type="text" id="mealTitle" placeholder="Was gibt es zu essen? (z.B. Lasagne)" required>
                <input type="text" id="location" placeholder="Wo? (z.B. Berlin, Kreuzberg)" required>
                <input type="time" id="time" required>
                <input type="number" id="spots" placeholder="Anzahl freie Plätze" min="1" max="20" required>
                <button type="submit">Essen eintragen</button>
            </form>
        </div>

        <div class="meals-list">
            <h2>Aktuelle Angebote</h2>
            <div id="mealsContainer">Lädt...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Deine persönliche Firebase Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyAajXHXdw5QfuXwwrHwNb4yw6Y1J-MMfhY",
            authDomain: "nevereatalone-4f0b2.firebaseapp.com",
            projectId: "nevereatalone-4f0b2",
            storageBucket: "nevereatalone-4f0b2.firebasestorage.app",
            messagingSenderId: "95484820062",
            appId: "1:95484820062:web:5a4416c32655daf02452cf"
        };

        // Firebase starten
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let meals = [];
        const addMealForm = document.getElementById('addMealForm');
        const mealsContainer = document.getElementById('mealsContainer');

        // Daten live aus der Datenbank lesen
        onSnapshot(collection(db, "meals"), (snapshot) => {
            meals = []; 
            snapshot.forEach((doc) => {
                let mealData = doc.data();
                mealData.id = doc.id; 
                meals.push(mealData);
            });
            renderMeals(); 
        });

        // Ein neues Essen in die Datenbank schreiben
        addMealForm.addEventListener('submit', async function(event) {
            event.preventDefault(); 
            const submitBtn = event.target.querySelector('button');
            submitBtn.disabled = true; 

            const newMeal = {
                hostName: document.getElementById('hostName').value,
                mealTitle: document.getElementById('mealTitle').value,
                location: document.getElementById('location').value,
                time: document.getElementById('time').value,
                spots: parseInt(document.getElementById('spots').value),
                guests: [] 
            };

            await addDoc(collection(db, "meals"), newMeal);
            
            addMealForm.reset();
            submitBtn.disabled = false; 
        });

        // Teilnahme in der Datenbank speichern
        window.joinMeal = async function(mealId) {
            const meal = meals.find(m => m.id === mealId);
            
            if (meal && meal.spots > 0) {
                const guestName = prompt("Wie lautet dein Name?");
                
                if (guestName && guestName.trim() !== "") {
                    const mealRef = doc(db, "meals", mealId);
                    await updateDoc(mealRef, {
                        spots: meal.spots - 1,
                        guests: [...meal.guests, guestName.trim()] 
                    });
                    alert("Erfolgreich angemeldet! Guten Appetit.");
                }
            }
        }

        // Gast in der Datenbank entfernen
        window.removeGuest = async function(mealId, guestIndex) {
            const meal = meals.find(m => m.id === mealId);
            
            if (meal) {
                const updatedGuests = [...meal.guests];
                const removedGuest = updatedGuests.splice(guestIndex, 1)[0];
                
                const mealRef = doc(db, "meals", mealId);
                await updateDoc(mealRef, {
                    spots: meal.spots + 1,
                    guests: updatedGuests
                });
                alert(`${removedGuest} wurde von der Gästeliste entfernt.`);
            }
        }

        // Die Liste anzeigen
        function renderMeals() {
            mealsContainer.innerHTML = ''; 

            if (meals.length === 0) {
                mealsContainer.innerHTML = '<p style="color: #888;">Momentan gibt es keine Angebote. Sei der Erste, der etwas anbietet!</p>';
                return;
            }

            meals.forEach(meal => {
                const card = document.createElement('div');
                card.className = 'meal-card';

                const isFull = meal.spots === 0;
                const buttonText = isFull ? 'Ausgebucht' : 'Teilnehmen';
                
                let guestsHTML = '';
                if (meal.guests && meal.guests.length > 0) {
                    let listItems = meal.guests.map((guest, index) => {
                        return `<li>
                                  ${guest} 
                                  <button class="remove-btn" onclick="removeGuest('${meal.id}', ${index})" title="Gast entfernen">❌</button>
                                </li>`;
                    }).join('');

                    guestsHTML = `
                        <details>
                            <summary>Gäste verwalten (${meal.guests.length})</summary>
                            <ul class="guest-list">
                                ${listItems}
                            </ul>
                        </details>
                    `;
                }
                
                card.innerHTML = `
                    <h3>${meal.mealTitle}</h3>
                    <div class="meal-details">
                        <span><strong>Host:</strong> ${meal.hostName}</span>
                        <span><strong>Ort:</strong> ${meal.location}</span>
                        <span><strong>Uhrzeit:</strong> ${meal.time} Uhr</span>
                        <span><strong>Freie Plätze:</strong> ${meal.spots}</span>
                    </div>
                    <button 
                        onclick="joinMeal('${meal.id}')" 
                        ${isFull ? 'disabled' : ''}>
                        ${buttonText}
                    </button>
                    ${guestsHTML}
                `;

                mealsContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
